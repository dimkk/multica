global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode tcp
  option tcplog
  timeout connect 10s
  timeout client 1m
  timeout server 1m

frontend tls_in
  bind *:443
  tcp-request inspect-delay 5s
  tcp-request content accept if { req.ssl_hello_type 1 }
  use_backend wstunnel_tls if { req.ssl_sni -i ssh.aiathome.ru }
  default_backend caddy_tls

backend caddy_tls
  server caddy caddy:443 check

backend wstunnel_tls
  server wstunnel wstunnel:8443 check
