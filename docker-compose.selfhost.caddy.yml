services:
  caddy:
    image: caddy:2.10
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?set PUBLIC_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?set LETSENCRYPT_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  admin-ssh:
    build:
      context: .
      dockerfile: Dockerfile.admin-ssh
    restart: unless-stopped
    environment:
      SSH_ADMIN_AUTHORIZED_KEY: ssh-rsa 
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

  wstunnel:
    image: ghcr.io/erebe/wstunnel:latest
    restart: unless-stopped
    command:
      - server
      - ws://0.0.0.0:8081
      - --restrict-to
      - admin-ssh:2222

volumes:
  caddy-data:
  caddy-config:
