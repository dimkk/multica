services:
  caddy:
    image: caddy:2.10
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?set PUBLIC_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?set LETSENCRYPT_EMAIL}
      SSH_TUNNEL_PATH_PREFIX: ${SSH_TUNNEL_PATH_PREFIX:-multica-ssh}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  wstunnel:
    image: ghcr.io/erebe/wstunnel:latest
    restart: unless-stopped
    command:
      - /bin/sh
      - -lc
      - >
        exec /home/app/wstunnel server
        --restrict-to 127.0.0.1:22
        --restrict-http-upgrade-path-prefix ${SSH_TUNNEL_PATH_PREFIX:-multica-ssh}
        ws://0.0.0.0:8081

volumes:
  caddy-data:
  caddy-config:
